# ============================================================================
# harness-helm h2 compound policy
# ============================================================================
# 이 파일은 h2-compound가 reusable knowledge와 canonical promotion candidate를
# 어떤 정책으로 정제하고 어디에 staging할지 정의한다. 즉 agent의 실행 시점
# 임의 판단을 줄이고, project-level compound policy를 repository에 남기는
# 실행 기준이다.
#
# 관심사 경계:
#   - h2-cartridge.yml: command provider/surface/fallback/routing
#   - h2-schema.yml: docs frontmatter와 validation schema
#   - h2-compound.yml: compound knowledge policy
#
# 파일이 없는 target project에서는 built-in default가 사용되며 workflow를 block하지 않는다.
# 자세한 계약은 cookbooks/0300-workflow-contract/0306-compound-policy-config.md를 본다.
# ============================================================================

# schema_version은 h2-compound.yml 자체의 config schema version이다.
# docs frontmatter schema_version과 의미가 다르다.
schema_version: 1

# domain_refinement는 h2-compound가 지식 후보를 얼마나 보수적으로 정제할지
# 결정한다. 이 값은 h2-context retrieval selection을 직접 바꾸지 않는다.
domain_refinement:
  # conservative: 검증된 명시 지식만 후보화한다.
  # synthesis: 여러 산출물의 반복 패턴을 요약해 후보화한다.
  # exploratory: 가설/관찰도 learning 또는 pending 후보로 남길 수 있다.
  mode: conservative
  # true이면 run-level override를 허용한다.
  # 예: $h2 compound mode=synthesis
  # override는 이 파일을 수정하지 않고 해당 run의 effective policy에만 기록한다.
  allow_run_override: true

# canonical_destination은 후보 유형별 기본 목적지를 정한다.
# 실제 governed canonical write는 approval 없이 수행하지 않는다.
canonical_destination:
  # 제품/업무 개념, 용어, 도메인 규칙.
  domain_rule: docs/10_domain
  # 반복 가능한 구현 해결책.
  implementation_pattern: docs/40_knowledge/solutions
  # 팀/런타임/문서 작성 규약.
  convention: docs/40_knowledge/conventions
  # 운영 절차, runbook, incident/release 운영 기준.
  operational_rule: docs/50_operations

# review_gate는 low-risk write와 governed promotion candidate의 경계를 정한다.
review_gate:
  # true이면 low-risk learning/solution은 overlap/schema/lint 확인 후 바로
  # 작성 또는 갱신할 수 있다.
  low_risk_auto_write: true
  # true이면 domain/spec/decision/governed convention/operations policy는
  # owner, verifier, PR reviewer, Tech Lead 승인 전까지 staging한다.
  governed_require_approval: true
  # auto-write 후보가 만족해야 하는 최소 confidence. confidence=high를 쓰려면
  # h2-schema.yml의 high-confidence evidence 조건도 만족해야 한다.
  confidence_threshold: high

# retrieval_hook_policy는 h2-compound가 생성한 문서가 다음 h2-context에서
# 다시 잘 발견되도록 필요한 metadata를 정한다.
#
# 적용 대상은 frontmatter에 generated_by: h2-compound가 있는 문서다.
# tags/source_trace/related에 h2-compound가 있다는 이유만으로 generated doc으로
# 보지 않는다. PDCA plan/design/report false positive를 막기 위한 경계다.
retrieval_hook_policy:
  # 누락 시 kb-lint warning을 낸다. 이번 scope에서는 hard error가 아니다.
  required:
    - domain
    - module
    - tags
  # 가능하면 채우도록 권장하지만 누락 자체를 block하지 않는다.
  recommended:
    - applies_to
    - retrieval_triggers
    - related
  # warn: kb-lint warning만 발생.
  # error: schema 값으로는 예약되어 있지만 현재 구현에서는 hard enforcement로
  # 승격하지 않고 warning으로 downgrade한다.
  enforcement: warn
