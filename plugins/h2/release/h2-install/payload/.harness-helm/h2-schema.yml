# ============================================================================
# harness-helm validation schema (frontmatter·문서 정책 단일 소스)
# ============================================================================
# 이 파일은 docs/ 아래 모든 markdown 문서가 따라야 하는 frontmatter 규칙과
# kb-lint·template-validate·archive 같은 harness 명령이 사용하는 검증 정책을 정의한다.
#
# 소스 cookbook (변경 시 본 파일과 함께 갱신):
#   - cookbooks/0100-knowledge-base-foundation/0102-frontmatter-schema.md
#       frontmatter 필수 필드·enum 정책
#   - cookbooks/0100-knowledge-base-foundation/0103-retrieval-and-index-policy.md
#       검색·인덱싱 정책과 exclude_paths 의미
#   - cookbooks/0300-workflow-contract/0301-core-workflow-spec.md
#       command 산출물·status 의미
#   - cookbooks/0500-enforcement/0501-enforcement-policy.md
#   - cookbooks/0500-enforcement/0502-enforcement-implementation.md
#       lint·검증 enforcement 절차
#
# 검증:
#   .harness-helm/scripts/harness kb-lint --strict
#   .harness-helm/scripts/harness template-validate --strict
#
# 기준 위계:
#   cookbook(기준 정의) > 이 파일(실행 기준) > docs/_templates/*(런타임 사용처)
# ============================================================================

# ----------------------------------------------------------------------------
# required_fields: 문서 frontmatter 필수 필드
# ----------------------------------------------------------------------------
# 모든 docs/ 문서가 반드시 가져야 하는 frontmatter 필드 목록.
# kb-lint가 누락을 hard_error로 검출한다.
# default 키는 type별 override가 없을 때 사용된다.
#
# related/source_references 경계:
#   - related는 target project runtime에도 존재하는 문서, trace, PR, ADR, 실행 surface만 담는다.
#   - target project에는 cookbooks/가 설치되지 않으므로 related에서 cookbooks/** 참조는 금지한다.
#   - harness-helm source repository에서만 필요한 cookbook 근거는 optional source_references에 둔다.
required_fields:
  default:
    # 문서 종류 — enums.type 값 중 하나여야 한다.
    - type
    # 문서 상태 — enums.status 값 중 하나여야 한다.
    - status
    # 보안 분류 — enums.security 값 중 하나여야 한다.
    - security

# ----------------------------------------------------------------------------
# enums: 필드별 허용값 정의
# ----------------------------------------------------------------------------
# frontmatter에서 사용되는 4개 enum 필드의 허용 목록.
# 목록에 없는 값을 사용하면 kb-lint가 hard_error로 거부한다.
enums:

  # type: 문서 종류. docs/_templates/ 아래 동일 이름의 템플릿이 매핑된다.
  type:
    # --- 0301 workflow command 산출물 타입 ---
    # 목표·scope·done 기준 (docs/01_plan/)
    - plan
    # 구현 흐름·인터페이스·검증 전략 (docs/02_design/)
    - design
    # plan/design consistency 검토 (docs/02_design/)
    - analysis
    # code/qa/security/cross review (docs/03_review/)
    - review
    # 작업 결과·승격 후보 정리 (docs/04_report/)
    - report
    # --- canonical knowledge 타입 ---
    # ADR — 단일 결정 기록 (docs/30_decisions/)
    - decision
    # 도메인 개념·용어 (docs/10_domain/)
    - domain
    # 제품·계약 명세 (docs/20_specs/)
    - spec
    # 해결 패턴 (docs/40_knowledge/)
    - solution
    # 코딩·문서 규약 (docs/40_knowledge/)
    - convention
    # 학습 기록 (docs/40_knowledge/)
    - learning
    # --- operations 타입 (docs/50_operations/) ---
    # 운영 절차
    - runbook
    # 인시던트 기록
    - incident
    # 릴리스 노트
    - release
  # status: 문서 상태. type별로 사용 가능한 상태가 다르다.
  # 0103 Retrieval and Index Policy가 status별 검색 우선순위를 정의한다.
  status:
    # --- 진행 중 상태 ---
    # 작성 중 (stale_days.draft = 30일)
    - draft
    # 검토 대기 (stale_days.pending = 14일)
    - pending
    # 미해결 (주로 incident)
    - open
    # --- 결정 상태 (주로 decision 문서) ---
    # 승인됨
    - accepted
    # 거부됨
    - rejected
    # --- 완료 계열 ---
    # 검증됨 (주로 canonical knowledge 타입)
    - verified
    # 안정 (주로 spec/domain)
    - stable
    # 활성 (주로 runbook)
    - active
    # 완료 (주로 plan/design/report)
    - done
    # 완료 대체 표기
    - completed
    # 완료 대체 표기
    - complete
    # --- 운영 상태 ---
    # 완화됨 (incident)
    - mitigated
    # 해결됨 (incident)
    - resolved
    # 리뷰 완료
    - reviewed
    # 릴리스됨 (release)
    - released
    # --- 종료 상태 ---
    # 후속 문서로 대체됨
    - superseded
    # 사용 중단
    - deprecated
    # archive 이동됨
    - archived

  # security: 보안 분류. 위에서 아래로 갈수록 제한이 강해진다.
  # 0103 Retrieval and Index Policy가 security별 검색·노출 정책을 정의한다.
  security:
    # 외부 공개 가능
    - public
    # 조직 내부용 (기본값으로 많이 쓰임)
    - internal
    # 제한된 사용자
    - restricted
    # 규제 대상 (감사 추적 필요)
    - regulated
    # 기밀
    - confidential

  # confidence: 문서 정확도에 대한 작성자 신뢰도.
  # high인 경우 confidence_high_evidence_fields 중 최소 하나가 함께 있어야 한다.
  confidence:
    - low
    - medium
    - high

  # target_runtime: release/install payload와 문서 원문의 관계.
  # optional field이며 값이 있으면 kb-lint가 enum을 검증한다.
  target_runtime:
    # target payload에 직접 포함되어도 되는 runtime 문서
    - included
    # source repository 설계/빌드/운영 문서라 target payload에 직접 포함하지 않는 문서
    - source_only
    # target runtime 문서나 snapshot이 이 문서에서 파생되지만 원문 자체는 포함하지 않는 문서
    - derived

# ----------------------------------------------------------------------------
# decision_status_by_suffix: decision 파일명 suffix → status 매핑
# ----------------------------------------------------------------------------
# decision 문서(ADR)는 파일명 suffix로 status를 추론한다.
# 예: ADR-0001-pending.md → frontmatter status: pending
# new-doc decision 명령이 ADR id를 생성할 때 이 매핑을 사용한다.
decision_status_by_suffix:
  draft: draft
  pending: pending
  accepted: accepted
  rejected: rejected

# ----------------------------------------------------------------------------
# confidence_high_evidence_fields: confidence: high일 때 필요한 evidence 필드
# ----------------------------------------------------------------------------
# 문서가 confidence: high를 선언하면, 아래 필드 중 최소 하나가 frontmatter에
# 함께 있어야 한다. 그렇지 않으면 kb-lint가 hard_error로 거부한다.
# 근거 없는 "high" 자칭을 방지하기 위한 강제 정책이다.
confidence_high_evidence_fields:
  # 사람이 검증한 기록 (검토자 이름·날짜)
  - human_verified_by
  # 자동화된 테스트로 검증
  - tests
  # 근거 PR 링크
  - source_pr
  # 과거 issue·외부 시스템 trace
  - source_trace

# ----------------------------------------------------------------------------
# generated_header: 자동 생성 문서의 마커 헤더
# ----------------------------------------------------------------------------
# kb-index 같은 자동 생성 스크립트가 문서 상단에 박는 마커.
# 사람이 수정하지 말라는 신호이며, 헤더가 있는 파일은 lint·archive에서 별도 처리된다.
generated_header: "<!-- AUTO-GENERATED: do not edit manually. Run .harness-helm/scripts/kb-index.sh. -->"

# ----------------------------------------------------------------------------
# domain_slugs: 허용된 domain slug 목록
# ----------------------------------------------------------------------------
# 문서 frontmatter의 module/domain 필드와 docs/10_domain/ 경로에 쓰이는 허용 slug.
# 목록에 없는 값을 쓰면 kb-lint가 거부한다.
# 신규 도메인이 필요하면 본 목록과 cookbook 0102를 함께 갱신한다.
domain_slugs:
  # 보험 도메인
  - insurance
  # 수수료 도메인
  - commission
  # 인사 도메인
  - hrm
  # 워크플로 도메인
  - workflow
  # 통합 도메인
  - integration

# ----------------------------------------------------------------------------
# module_slugs: 허용된 module slug 목록
# ----------------------------------------------------------------------------
# docs frontmatter의 module 필드에서 사용할 수 있는 module slug.
# 신규 module이 필요하면 본 목록과 cookbook 0102를 함께 갱신한다.
module_slugs:
  - bootstrap-system
  - bootstrap-human-resource-mng
  - bootstrap-workflow
  - hera-webapp
  - hera-system
  - hera-human-resource-mng
  - hera-workflow
  - hera-domain-data
  - hera-api-client
  - hera-commons
  - _msa-api-gateway
  - _msa-service-discovery
  - _system-doctor
  - _hera-code-gen
  - docs
  - workflow
  - infra
  - cross-cutting

# ----------------------------------------------------------------------------
# stale_days: 상태별 stale 판정 일수
# ----------------------------------------------------------------------------
# 마지막 updated_at으로부터 경과한 일수가 임계값을 넘으면 stale 경고가 발생한다.
# archive·sweep 명령이 이 값을 사용해 처리 후보를 산출한다.
stale_days:
  # draft 문서: 30일 이내 갱신 필요
  draft: 30
  # pending 문서: 14일 이내 결정 필요
  pending: 14
  # .harness-helm/runs/{feature}/{run-id}/ 산출물 (검증 전): 7일
  harness_raw: 7
  # 정규화된 harness 산출물: 30일
  harness_normalized: 30

# ----------------------------------------------------------------------------
# exclude_paths: lint·index에서 제외할 경로 패턴
# ----------------------------------------------------------------------------
# glob 패턴으로 일치하는 파일은 frontmatter lint와 KB 인덱싱에서 제외된다.
# 주로 템플릿·자동 생성 README·runtime staging이 해당한다.
exclude_paths:
  lint_index:
    # 문서 템플릿 자체는 frontmatter placeholder를 포함하므로 lint 제외
    - docs/_templates/**
    # docs 폴더별 README는 자동 생성·안내문이므로 lint 제외
    - docs/01_plan/README.md
    - docs/02_design/README.md
    - docs/03_review/README.md
    - docs/04_report/README.md
    - docs/10_domain/README.md
    - docs/20_specs/README.md
    - docs/30_decisions/README.md
    - docs/40_knowledge/README.md
    - docs/50_operations/README.md
    # 40_knowledge·50_operations는 subtype 폴더별 README 모두 제외
    - docs/40_knowledge/**/README.md
    - docs/50_operations/**/README.md
    # harness staging 산출물 템플릿은 정식 docs가 아니므로 제외
    - .harness-helm/runs/_templates/**

# ----------------------------------------------------------------------------
# compound_policy_schema: .harness-helm/h2-compound.yml 검증 기준
# ----------------------------------------------------------------------------
# h2-schema.yml은 docs frontmatter schema의 기준 파일이지만,
# h2-compound.yml의 shape 검증을 위해 compound policy schema를
# 별도 top-level block으로 둔다.
#
# 책임 경계:
#   - docs required_fields/enums: 모든 docs/ 문서의 frontmatter 공통 규칙.
#   - compound_policy_schema:     .harness-helm/h2-compound.yml 파일의
#     구조·허용 값 선언. docs frontmatter 규칙과 독립적이다.
#
# 검증 방식:
#   - kb-lint가 h2-compound.yml 파일이 존재할 때만 shape 검증을 실행한다.
#   - 파일이 없으면 검증을 건너뛰고 built-in default를 사용한다.
#   - 위반은 모두 hard error가 아닌 warning으로 보고한다.
#
# 소스 cookbook (변경 시 본 block과 함께 갱신):
#   - cookbooks/0300-workflow-contract/0304-canonical-promotion-flow.md
#       destination별 low-risk/governed 승인 경계
#   - cookbooks/0500-enforcement/0503-h2-runtime-folder-structure.md
#       .harness-helm/ 파일 목록과 각 파일의 책임
compound_policy_schema:

  # schema_versions: h2-compound.yml에서 허용하는 schema_version 값 목록.
  # h2-compound.yml의 최상단 schema_version 필드가 이 목록에 없으면 warning.
  # 현재 지원 버전은 1이며, 신규 버전 추가 시 이 목록을 함께 갱신한다.
  schema_versions:
    - 1

  # modes: domain_refinement.mode 허용 값 목록.
  # h2-compound가 reusable knowledge 후보를 생성하거나 staging할 때
  # 어떤 기준으로 정제할지 결정한다. 목록에 없는 mode는 kb-lint가 warning을 낸다.
  #
  # 값별 의미:
  #   conservative  검증된 명시 지식만 canonical 후보로 승격한다.
  #                 가장 엄격하며 오탐이 가장 적다.
  #   synthesis     여러 작업 산출물에서 반복 패턴을 요약해
  #                 도메인 지식 후보로 추출한다.
  #   exploratory   아직 확정되지 않은 가설·관찰도 learning 또는
  #                 pending knowledge로 기록한다.
  #
  # 주의: mode는 h2-compound 후보 생성 정책에만 영향을 준다.
  #       h2-context retrieval selection을 직접 바꾸지 않는다.
  modes:
    - conservative
    - synthesis
    - exploratory

  # destination_keys: canonical_destination 섹션에서 사용할 수 있는 key 목록.
  # h2-compound가 후보 문서를 어떤 canonical 경로로 보낼지 결정할 때 참조한다.
  # 목록에 없는 key가 h2-compound.yml에 있으면 kb-lint가 unknown key warning을 낸다.
  #
  # 값별 의미:
  #   domain_rule             도메인 개념·용어 → docs/10_domain
  #   implementation_pattern  재사용 가능한 구현 패턴 → docs/40_knowledge/solutions
  #   convention              워크플로·제품 규약 → docs/40_knowledge/conventions
  #   operational_rule        운영 절차·정책 → docs/50_operations
  #
  # 주의: destination 경로는 절대 경로이거나 ..를 포함하면 warning.
  #       actual 경로 값은 h2-compound.yml 파일에서 자유롭게 설정하되,
  #       이 key 목록으로 허용된 key 이름인지만 여기서 검증한다.
  destination_keys:
    - domain_rule
    - implementation_pattern
    - convention
    - operational_rule

  # enforcement: retrieval_hook_policy.enforcement 허용 값 목록.
  # h2-compound가 생성·staging한 문서가 retrieval_hook_policy.required 필드를
  # 갖추지 못했을 때 kb-lint의 반응 수준을 결정한다.
  #
  # 값별 의미:
  #   warn   요건 미충족을 warning으로만 보고한다. workflow는 계속 진행된다.
  #   error  설정 값으로는 허용되지만, 현재 scope에서 hard error로 동작하지 않는다.
  #          설정에 error가 있어도 kb-lint는 warn 수준으로 낮춰 보고한다.
  #          hard enforcement 전환은 후속 이슈(Issue #73 follow-up)로 남긴다.
  enforcement:
    - warn
    - error

  # retrieval_hook_fields: retrieval_hook_policy.required 및 recommended에서
  # 사용할 수 있는 frontmatter 필드 이름 목록.
  # h2-compound.yml의 required/recommended 배열에 이 목록에 없는 값이 있으면
  # kb-lint가 unknown field warning을 낸다.
  #
  # 값별 의미:
  #   domain             문서가 속한 비즈니스 도메인 슬러그.
  #   module             문서가 속한 기술 모듈 슬러그.
  #   tags               검색 보조 신호 배열. status/security보다 우선하지 않는다.
  #   applies_to         이 지식이 적용되는 컨텍스트나 조건.
  #   retrieval_triggers h2-context가 이 문서를 재발견하는 데 쓸 키워드·조건.
  #   related            관련 문서·결정·ADR 경로 목록.
  #
  # required vs recommended 분리 기준:
  #   required   h2-compound generated/staged 문서가 반드시 갖춰야 한다.
  #              현재 기본 required: [domain, module, tags]
  #   recommended 있으면 retrieval 품질이 높아지지만 없어도 warning만 낸다.
  #              현재 기본 recommended: [applies_to, retrieval_triggers, related]
  retrieval_hook_fields:
    - domain
    - module
    - tags
    - applies_to
    - retrieval_triggers
    - related
